<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACHEMISEDEJEREMIE | 90s VINTAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        h1 { font-family: 'Archivo Black', sans-serif; }

        .logo-img { mix-blend-mode: screen; filter: drop-shadow(0 0 12px rgba(255,255,255,0.15)); }

        /* Card Design */
        .product-card { border: 1px solid #111; background: #050505; transition: 0.3s ease; }
        .product-card:hover { border-color: #fff; }

        /* Multi-Image Swipe Logic */
        .image-scroll-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            background: #000;
            scrollbar-width: none;
        }
        .image-scroll-container::-webkit-scrollbar { display: none; }
        .image-scroll-container img {
            scroll-snap-align: center;
            flex-shrink: 0;
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; }
        
        /* Contact Button Minimal */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #1a1a1a;
            padding: 8px 25px;
            transition: 0.4s;
            background: transparent;
        }
        .contact-btn:hover { border-color: #fff; background: #fff; color: #000; }
        .contact-btn img { width: 15px; height: 15px; transition: 0.4s; }
        .contact-btn:hover img { filter: invert(1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 text-center">
        <div class="flex flex-col items-center">
            <img src="https://i.postimg.cc/RhY8CCdp/58A21F1E-8F91-40B0-AF8E-E40DB71B5611.png" alt="Logo" class="logo-img w-32 md:w-40 h-auto mb-6">
            <h1 class="text-4xl md:text-7xl leading-tight uppercase italic tracking-tighter mb-4">LACHEMISE<br class="md:hidden"> DEJEREMIE</h1>
            
            <!-- Location & Shipping -->
            <div class="border border-gray-800 text-gray-500 px-6 py-2 text-[10px] font-bold uppercase inline-block mb-8">
                📍 Bangkok University Free Shipping
            </div>
            
            <!-- Instagram Link -->
            <div class="flex justify-center">
                <a href="https://www.instagram.com/lachemisedejeremie" target="_blank" class="contact-btn">
                    <img src="https://www.edigitalagency.com.au/wp-content/uploads/new-Instagram-logo-white-glyph.png" alt="IG">
                    <span class="text-[11px] font-black uppercase tracking-widest">Instagram</span>
                </a>
            </div>
        </div>
    </header>

    <div id="catalog" class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
        <!-- Products load here -->
    </div>

    <!-- Modal System -->
    <div id="productModal" class="modal overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center p-2 md:p-4">
            <div class="max-w-4xl w-full bg-[#050505] p-4 md:p-10 border border-gray-900 relative">
                <button onclick="closeModal()" class="absolute top-2 right-4 text-4xl font-light z-50 text-white">&times;</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <div id="modalImageContainer" class="image-scroll-container border border-gray-900"></div>
                        <div class="flex justify-between items-center mt-3 text-[9px] text-gray-600 uppercase tracking-widest">
                            <span>← Swipe to view photos →</span>
                        </div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <h2 id="modalTitle" class="text-2xl md:text-4xl font-black uppercase italic mb-4 leading-tight"></h2>
                        <div id="modalPrice" class="text-3xl md:text-4xl font-black mb-8 border-b border-gray-900 pb-4"></div>
                        <div class="grid grid-cols-2 gap-6 text-[10px] uppercase mb-10">
                            <div><span class="text-gray-600 block mb-2">Size</span><span id="modalSize" class="text-base font-bold"></span></div>
                            <div><span class="text-gray-600 block mb-2">Condition</span><span id="modalCond" class="text-base font-bold"></span></div>
                        </div>
                        <a id="igShop" href="https://www.instagram.com/lachemisedejeremie" target="_blank" class="block w-full bg-white text-black py-5 text-center font-black uppercase text-sm hover:tracking-widest transition-all">Order via Shop</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqCLzpdL7cfalck0TGZOEWh-76coa84K0k-xqRRpntZHx0KXny_yxw0MH9WLxMVgba1_Qo1TTbYO18/pub?gid=0&single=true&output=csv";

        // Advanced CSV Parser for Full Titles
        function splitCSV(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                if (char === '"' && row[i+1] === '"') { current += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                else { current += char; }
            }
            result.push(current);
            return result;
        }

        async function loadProducts() {
            try {
                const response = await fetch(SHEET_CSV);
                const data = await response.text();
                const lines = data.split(/\r?\n/).filter(line => line.trim() !== "");
                const catalog = document.getElementById('catalog');
                catalog.innerHTML = "";

                let productList = [];
                for (let i = 1; i < lines.length; i++) {
                    const columns = splitCSV(lines[i]);
                    if (columns.length < 5) continue;
                    const clean = (str) => str ? str.replace(/^["\s]+|["\s]+$/g, '').trim() : "";
                    productList.push({
                        title: clean(columns[0]),
                        price: clean(columns[1]),
                        size: clean(columns[2]),
                        cond: clean(columns[3]),
                        imgList: columns[4].replace(/"/g, '').split(/,|\s+/).map(u => u.trim()).filter(u => u.startsWith('http')),
                        status: clean(columns[5]).toLowerCase()
                    });
                }

                // Push Sold Out to Bottom
                productList.sort((a, b) => {
                    if (a.status === 'sold out' && b.status !== 'sold out') return 1;
                    if (a.status !== 'sold out' && b.status === 'sold out') return -1;
                    return 0;
                });

                productList.forEach(p => {
                    const isSoldOut = p.status === 'sold out';
                    const card = document.createElement('div');
                    card.className = `product-card p-2 ${isSoldOut ? 'opacity-40 cursor-default' : 'cursor-pointer group'}`;
                    if (!isSoldOut) card.onclick = () => openModal(p);
                    card.innerHTML = `
                        <div class="aspect-[3/4] overflow-hidden mb-3 bg-[#111] relative">
                            ${isSoldOut ? '<div class="absolute inset-0 flex items-center justify-center z-10"><span class="bg-red-600 text-white text-[10px] font-black px-3 py-1 uppercase shadow-xl">SOLD OUT</span></div>' : ''}
                            <img src="${p.imgList[0]}" class="w-full h-full object-cover ${!isSoldOut ? 'grayscale group-hover:grayscale-0' : ''} transition-all duration-500">
                        </div>
                        <h3 class="text-[9px] font-bold text-gray-500 uppercase truncate px-1">${p.title}</h3>
                        <p class="text-lg font-black italic px-1">${isSoldOut ? '---' : '฿' + p.price}</p>
                    `;
                    catalog.appendChild(card);
                });
            } catch (e) { console.error("Sync Error:", e); }
        }

        function openModal(p) {
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalPrice').innerText = p.price.includes('฿') ? p.price : "฿" + p.price;
            document.getElementById('modalSize').innerText = p.size;
            document.getElementById('modalCond').innerText = p.cond;
            const imgHtml = p.imgList.map(url => `<img src="${url}" alt="gallery">`).join('');
            const container = document.getElementById('modalImageContainer');
            container.innerHTML = imgHtml;
            container.scrollLeft = 0; 
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
