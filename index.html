<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACHEMISEDEJEREMIE | 90s VINTAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fff;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
        }

        h1 { font-family: 'Archivo Black', sans-serif; }

        .product-card {
            border: 1px solid #1a1a1a;
            background: #050505;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            border-color: #fff;
            transform: translateY(-5px);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            overflow-y: auto;
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Header Section with Logo -->
    <header class="max-w-6xl mx-auto mb-16 text-center border-b border-gray-900 pb-10">
        <div class="flex flex-col items-center">
            <!-- LOGO -->
            <img src="https://i.postimg.cc/RhY8CCdp/58A21F1E-8F91-40B0-AF8E-E40DB71B5611.png" 
                 alt="Lachemisedejeremie Logo" 
                 class="w-32 md:w-40 h-auto mb-6 logo-glow">
            
            <h1 class="text-4xl md:text-7xl leading-none uppercase italic tracking-tighter mb-2">
                LACHEMISE<br class="md:hidden">DEJEREMIE
            </h1>
            
            <p class="text-xs md:text-sm tracking-[0.4em] text-gray-500 uppercase font-bold mb-6">ขาย / แลกเปลี่ยน / 90s Vibe</p>
            
            <div class="bg-white text-black px-4 py-1 text-[10px] font-black uppercase inline-block">
                📍 Bangkok University ส่งฟรี
            </div>
        </div>
    </header>

    <!-- Catalog Grid -->
    <div id="catalog" class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
        <p class="col-span-full text-center py-20 text-gray-800 animate-pulse uppercase tracking-[0.5em]">Loading Records...</p>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-0 md:gap-10 bg-[#080808] p-6 md:p-10 border border-gray-900 relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-4xl font-light hover:rotate-90 transition-transform duration-300">&times;</button>
                
                <div id="modalImageContainer" class="bg-[#050505] p-2 border border-gray-900"></div>
                
                <div class="flex flex-col justify-center mt-6 md:mt-0">
                    <h2 id="modalTitle" class="text-3xl md:text-5xl font-black uppercase italic leading-tight mb-4 text-white"></h2>
                    <div id="modalPrice" class="text-4xl font-black mb-8 text-white"></div>
                    
                    <div class="grid grid-cols-2 gap-4 text-[10px] uppercase tracking-widest mb-10 border-t border-gray-900 pt-6">
                        <div>
                            <span class="text-gray-600 block mb-2">Size</span>
                            <span id="modalSize" class="text-base font-bold text-white"></span>
                        </div>
                        <div>
                            <span class="text-gray-600 block mb-2">Condition</span>
                            <span id="modalCond" class="text-base font-bold text-white"></span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <a id="igShop" href="https://www.instagram.com/lachemisedejeremie" target="_blank" class="block w-full bg-white text-black py-4 text-center font-black uppercase hover:bg-gray-200 transition">Order via Shop</a>
                        <a id="igPersonal" href="https://www.instagram.com/sta_png" target="_blank" class="block w-full border border-gray-800 py-3 text-center text-gray-500 uppercase text-[10px] tracking-widest hover:text-white transition">Contact @sta_png</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqCLzpdL7cfalck0TGZOEWh-76coa84K0k-xqRRpntZHx0KXny_yxw0MH9WLxMVgba1_Qo1TTbYO18/pub?gid=0&single=true&output=csv";

        async function loadProducts() {
            try {
                const response = await fetch(SHEET_CSV);
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                const catalog = document.getElementById('catalog');
                catalog.innerHTML = "";

                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length < 5) return;

                    const p = {
                        title: columns[0],
                        price: columns[1],
                        size: columns[2],
                        cond: columns[3],
                        img: columns[4].trim(),
                    };

                    const card = document.createElement('div');
                    card.className = "product-card p-2 cursor-pointer group";
                    card.onclick = () => openModal(p);
                    card.innerHTML = `
                        <div class="aspect-[3/4] overflow-hidden mb-3 bg-[#111]">
                            <img src="${p.img}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="px-1">
                            <h3 class="text-[9px] font-bold text-gray-500 uppercase tracking-widest truncate mb-1">${p.title}</h3>
                            <p class="text-base font-black italic">฿${p.price}</p>
                        </div>
                    `;
                    catalog.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('catalog').innerHTML = "<p class='col-span-full text-center text-gray-700'>FAILED TO LOAD RECORDS</p>";
            }
        }

        function openModal(p) {
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalPrice').innerText = "฿" + p.price;
            document.getElementById('modalSize').innerText = p.size;
            document.getElementById('modalCond').innerText = p.cond;
            document.getElementById('modalImageContainer').innerHTML = `<img src="${p.img}" class="w-full h-auto">`;
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
